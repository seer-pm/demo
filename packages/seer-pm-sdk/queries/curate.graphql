query GetImages(
  $where: LItem_bool_exp
  $skip: Int = 0
  $first: Int = 100
) {
  LItem(where: $where, offset: $skip, limit: $first) {
    itemID
    status
    registryAddress
    props {
      value
      description
      label
    }
    data
    latestRequester
    disputed
    requests {
      requestType
      resolved
    }
    latestRequestSubmissionTime
  }
}
