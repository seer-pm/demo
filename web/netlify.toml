[build]
  base = "/"
  publish = "/web/dist/client/"
  command = "yarn workspace @seer-pm/sdk build && yarn workspace @seer-pm/subgraph build && NODE_ENV=production yarn workspace @seer-pm/web build"
  edge_functions = "web/netlify/edge-functions"

[build.environment]
  NODE_VERSION = "20.18.0"

[dev]
  command = "node ./web/server"
  framework = "#custom"
  targetPort = 3000
  port = 8888

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["@sparticuz/chromium"]
  directory = "web/netlify/functions"

[build.processing.html]
  pretty_urls = true

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/index"
  status = 200